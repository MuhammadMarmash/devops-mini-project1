name: deploy-on-push
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
      - name: Install dependencies
        working-directory: ./app
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: lint with flake8
        working-directory: ./app
        run: |
          flake8 .
      - name: security check with bandit
        working-directory: ./app
        run: |
          # Exclude tests/ (assert use is expected there) and skip B104
          # (binding to 0.0.0.0 is intentional for the deployed app).
          bandit -r . -x ./tests --skip B104
      - name: Run tests with pytest
        working-directory: ./app
        run: |
          pytest --maxfail=5 --disable-warnings -q
      - name: check_coverage
        working-directory: ./app
        run: |
          pip install coverage
          coverage run -m pytest
          coverage report -m

      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            sudo -u appuser git -C /opt/todo-api pull --ff-only
            sudo -u appuser /opt/todo-api/venv/bin/pip install -r /opt/todo-api/app/requirements.txt
            sudo systemctl restart todo-api.service

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "http://${{ secrets.EC2_HOST }}:5000/health"; then
              echo ""
              echo "App is healthy ✅"
              exit 0
            fi
            echo "Waiting for app to come up... ($i/10)"
            sleep 5
          done
          echo "Health check failed ❌"
          exit 1
